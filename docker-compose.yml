services:
  postgres:
    image: postgres:16-alpine
    container_name: relayx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-relayx}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-relayx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./services/auth-service
    container_name: relayx-auth
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-relayx}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-relayx-access-secret-key}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-relayx-refresh-secret-key}
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  chat-service:
    build:
      context: ./services/chat-service
    container_name: relayx-chat
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-relayx}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-relayx-access-secret-key}
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    container_name: relayx-frontend
    environment:
      VITE_AUTH_API_URL: http://localhost:8000
      VITE_CHAT_API_URL: http://localhost:8001
      VITE_CHAT_WS_URL: ws://localhost:8001/ws
    depends_on:
      - auth-service
      - chat-service
    ports:
      - "5173:5173"

volumes:
  postgres-data:
